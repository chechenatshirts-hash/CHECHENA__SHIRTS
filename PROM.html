<style>

.filter-btn {

.filter-btn:hover {

@media (max-width: 768px) {

button.copy-btn {

    font-family: inherit;

button.copy-btn:hover { background: #b91c1c; border-color: #b91c1c; }

.category-badge {

footer {

<script>
const PROMPTS = [
    { category: "streetwear", title: "🐻 Oso Streetwear Boss", desc: "Oso dominante con actitud urbana y accesorios gold.", prompt: "Diseño de un oso de cuerpo completo en estilo streetwear, con una pose imponente y detalles modernos. El oso debe llevar accesorios urbanos como gafas de sol, cadenas de oro gruesas, gorra de lado y zapatillas Jordan. Su pelaje puede tener texturas estilizadas o patrones para darle un toque artístico. Incluir detalles de graffiti o elementos urbanos en el diseño, con colores vibrantes que contrasten fuertemente contra un fondo negro. Sin elementos extra alrededor, solo el oso de cuerpo completo y los detalles mencionados." },
    { category: "streetwear", title: "🦁 León Grafitero", desc: "León con corona en estilo grafiti urbano vibrante.", prompt: "Ilustración de un león de cuerpo completo en streetwear urbano con corona dorada, cadenas gruesas, gafas de sol reflectantes y fondo de graffiti colorido. El león debe tener melena estilizada con texturas urbanas, ropa oversize tipo hoodie, y pose dominante. Incorporar detalles modernos como auriculares, sneakers premium y elementos de spray paint en colores neón sobre fondo negro." },
    { category: "streetwear", title: "🦅 Águila Skater", desc: "Águila en skate con accesorios urbanos y fondo de ciudad.", prompt: "Diseño de un águila antropomorfa haciendo un truco en patineta, ropa deportiva oversize, gorra hacia atrás, mochila vintage y auriculares grandes. El águila debe tener alas extendidas en pose dinámica, plumas con detalles urbanos, y estar rodeada de grafismos de ciudad. Incorporar tipografía bold y colores street sobre fondo oscuro con luces de neón." },
    { category: "streetwear", title: "👟 Sneaker Fusion", desc: "Zapatillas icónicas fusionadas con elementos abstractos.", prompt: "Ilustración de un par de sneakers flotando en el aire, fusionados con formas abstractas geométricas y salpicaduras de pintura estilo graffiti. Los sneakers deben tener detalles hiperrealistas, cordones dinámicos, y estar rodeados de elementos urbanos como códigos QR, iconos digitales y texturas de concreto. Usar paleta de colores saturados con acentos en neón." },
    { category: "streetwear", title: "🧢 Skateboy Urbano", desc: "Chico con sudadera, chains y fondo de rayos urban.", prompt: "Ilustración de un joven skater en pose relajada, con sudadera con capucha oversize, cadenas de oro, gorra snapback, y patineta en la mano. Estilo de ilustración semi-realista con detalles urbanos, fondo de rayos geométricos, elementos de street art y tipografía grunge. Paleta de colores oscura con acentos vibrantes." },
    { category: "streetwear", title: "🌆 Cityscape Silhouette", desc: "Silueta de ciudad con elementos streetwear superpuestos.", prompt: "Diseño que combine la silueta de una ciudad moderna al atardecer con elementos de streetwear flotando: zapatillas, gorras, cadenas y graffitis. La ciudad debe tener rascacielos estilizados, luces de neón y un cielo degradado. Los elementos streetwear deben estar integrados orgánicamente en la composición con efectos de transparencia." },
    { category: "streetwear", title: "🔥 Fire Typography Urban", desc: "Letras en llamas con elementos urbanos integrados.", prompt: "Tipografía bold en llamas realistas con elementos urbanos integrados: cadenas que atraviesan las letras, spray paint dripping, y efectos de neón. Las llamas deben ser hiperrealistas con colores que van del rojo al azul eléctrico. Incorporar texturas de concreto y metal oxidado como elementos de fondo." },
    { category: "streetwear", title: "🎯 Target Street Art", desc: "Diana de tiro con elementos de street art superpuestos.", prompt: "Diseño de una diana de tiro al blanco con capas de graffiti, stickers urbanos y elementos de street art superpuestos. La diana debe tener texturas desgastadas, colores vibrantes que contrasten, y elementos como códigos de barras, iconos urbanos y tipografía stencil alrededor." },
    { category: "streetwear", title: "⚡ Thunder Skateboard", desc: "Patineta con rayos eléctricos y efectos urbanos.", prompt: "Ilustración de una patineta flotando con rayos eléctricos saliendo de las ruedas, efectos de electricidad azul y púrpura, fondo urbano oscuro con texturas de asfalto. La patineta debe tener gráficos personalizados, detalles metálicos y estar rodeada de partículas eléctricas brillantes." },
    { category: "streetwear", title: "🏢 Urban Geometry", desc: "Formas geométricas con texturas urbanas y colores street.", prompt: "Composición de formas geométricas abstractas (triángulos, hexágonos, círculos) con texturas urbanas: concreto, metal oxidado, graffiti. Cada forma debe tener un color diferente pero dentro de una paleta urbana (grises, negros, acentos en neón). Incluir elementos como códigos QR y tipografía minimal." },
    { category: "streetwear", title: "🎨 Spray Can Art", desc: "Latas de spray creando arte en tiempo real con colores vibrantes.", prompt: "Ilustración de latas de spray en el aire creando un mural colorido, con chorros de pintura formando formas abstractas y letras. Las latas deben estar flotando en pose dinámica, con etiquetas street style, y rodeadas de salpicaduras de colores neón sobre fondo negro urbano." },
    { category: "streetwear", title: "🔗 Chain Reaction", desc: "Cadenas de oro entrelazadas formando patrones urbanos.", prompt: "Diseño de cadenas de oro de diferentes grosores entrelazándose para formar un patrón complejo, con algunos eslabones brillando con efectos de luz. Incluir elementos como candados vintage, dijes urbanos (dados, llaves, símbolos) y texturas metálicas realistas sobre fondo oscuro." },
    { category: "streetwear", title: "🌈 Rainbow Drip", desc: "Efecto de pintura goteando en colores arcoíris urban style.", prompt: "Efecto de pintura multicolor goteando desde la parte superior, con colores vibrantes que se mezclan (neón rosa, azul eléctrico, verde lima, amarillo intenso). La pintura debe tener textura realista, reflejos metálicos y formar charcos en la parte inferior con salpicaduras dinámicas." },
    { category: "streetwear", title: "🎧 DJ Urban Setup", desc: "Setup de DJ con tornamesas, auriculares y efectos de sonido.", prompt: "Composición de equipos de DJ: tornamesas vintage, mixer profesional, auriculares colgando, discos de vinilo flotando, y ondas de sonido visibles. Todo con estética urbana moderna, colores neón, efectos de luz y texturas metálicas. Incluir elementos como cables, botones brillantes y displays digitales." },
    { category: "anime", title: "🎌 Samurai Moderno", desc: "Guerrero samurai con elementos futuristas y katana brillante.", prompt: "Ilustración en estilo anime de un samurai moderno con armadura que mezcla elementos tradicionales japoneses y tecnología futurista. Debe tener una katana con efectos de luz azul eléctrico, máscara oni modernizada, y estar en pose de combate dinámica. Fondo con kanji brillantes y efectos de partículas. Estilo de sombreado cel-shading con colores saturados." },
    { category: "anime", title: "🌸 Sakura Warrior", desc: "Guerrera femenina rodeada de pétalos de cerezo flotantes.", prompt: "Personaje femenina anime en estilo warrior, con armadura ligera decorada con patrones de sakura, cabello largo fluyendo en el viento, rodeada de pétalos de cerezo rosa que brillan con luz suave. Pose elegante pero poderosa, con efectos mágicos rosados y fondo de luna llena. Estilo manga moderno con detalles delicados." },
    { category: "anime", title: "⚡ Electric Ninja", desc: "Ninja con poderes eléctricos y efectos de rayos azules.", prompt: "Ninja anime en pose de ataque con rayos eléctricos azules saliendo de sus manos, traje negro con detalles en neón, máscara futurista y ojos brillantes. Debe estar saltando en el aire con efectos de electricidad rodeándolo, fondo de ciudad nocturna japonesa con luces neón. Estilo dinámico con muchos efectos de luz." },
    { category: "anime", title: "🔥 Fire Dragon", desc: "Dragón de fuego en estilo anime con llamas realistas.", prompt: "Dragón de fuego en estilo anime japonés, con escamas detalladas, llamas realistas saliendo de su boca, ojos intensos y pose amenazante. El dragón debe tener una mezcla de colores rojos, naranjas y dorados, con efectos de partículas de fuego flotando alrededor. Fondo oscuro con destellos de fuego." },
    { category: "anime", title: "🌟 Magical Girl", desc: "Chica mágica con vara brillante y efectos de estrellas.", prompt: "Personaje de magical girl en estilo anime clásico, con traje colorido decorado con estrellas, vara mágica brillante, twin tails con lazos grandes, y pose dinámica de transformación. Rodeada de efectos mágicos con estrellas, corazones y brillos. Colores pastel vibrantes con acentos dorados y efectos de luz suave." },
    { category: "anime", title: "🤖 Mecha Pilot", desc: "Piloto de robot gigante con casco futurista y controles.", prompt: "Piloto anime en cabina de mecha, con casco futurista transparente, traje de piloto con luces LED, controles holográficos flotantes, y expresión concentrada. La cabina debe tener pantallas con datos, efectos de hologramas, y luces azules/verdes. Estilo sci-fi anime con detalles técnicos precisos." },
    { category: "anime", title: "🐺 Wolf Spirit", desc: "Personaje con espíritu de lobo y aura mística azul.", prompt: "Personaje anime con conexión espiritual a lobos, orejas de lobo, cola fluida, ojos dorados brillantes, ropa tribal moderna, y una aura azul mística. Debe estar acompañado por espíritus de lobo translúcidos, en pose de invocación, con efectos de viento y partículas azules flotando." },
    { category: "anime", title: "🌙 Moon Guardian", desc: "Guardian lunar con armadura plateada y símbolos lunares.", prompt: "Guardián lunar anime con armadura plateada elegante decorada con símbolos de luna y estrellas, capa que flota como si fuera líquida, bastón lunar brillante, y pose protectora. Fondo de cielo nocturno estrellado con luna llena grande, rayos de luz plateada, y efectos de magia lunar." },
    { category: "anime", title: "⚔️ Dual Swords", desc: "Espadachín con dos katanas y técnica de corte rápido.", prompt: "Espadachín anime empuñando dos katanas en pose de técnica especial, con efectos de velocidad y cortes de viento visibles, ropa tradicional japonesa modernizada, y expresión de concentración intensa. Las espadas deben tener auras de colores diferentes (azul y roja), con efectos de slash marks en el aire." },
    { category: "vintage", title: "📻 Retro Radio", desc: "Radio vintage con ondas musicales y estética de los 50s.", prompt: "Ilustración de una radio vintage de los años 50, con detalles art déco, ondas sonoras visibles saliendo del aparato, colores sepia y dorados, texturas desgastadas que sugieren nostalgia. Incluir elementos como notas musicales flotantes, patrones geométricos de la época, y efectos de luz cálida que resalten los controles y la antena." },
    { category: "vintage", title: "🚗 Classic Car", desc: "Automóvil clásico americano con detalles cromados brillantes.", prompt: "Muscle car americano de los años 70, con pintura metalizada brillante, cromados relucientes, llamas decorativas en los laterales, y pose dinámica como si estuviera en movimiento. Fondo de highway con efecto de velocidad, colores saturados estilo poster vintage, y detalles hiperrealistas en las llantas y reflejos." },
    { category: "vintage", title: "🌅 Synthwave Sunset", desc: "Atardecer synthwave con grid, palmeras y colores neón retro.", prompt: "Paisaje synthwave clásico con sol grande estilo retro-futurista, grid perspective en el suelo, palmeras en silueta, montañas geométricas, y colores neón (rosa magenta, azul cian, púrpura). Incluir efectos de brillo, scanlines sutiles, y estética de los 80s con elementos geométricos flotantes." },
    { category: "vintage", title: "🎸 Rock Vintage", desc: "Guitarra eléctrica con amplificador y efectos de sonido vintage.", prompt: "Guitarra eléctrica vintage (estilo Stratocaster o Les Paul) conectada a un amplificador Marshall, con efectos de sonido visibles, cables enredados artísticamente, y pedales de efectos en el suelo. Iluminación dramática estilo concierto, colores cálidos, y texturas desgastadas que sugieran años de uso en el rock." },
    { category: "vintage", title: "📷 Vintage Camera", desc: "Cámara de película clásica con lente y efectos fotográficos.", prompt: "Cámara de película vintage (estilo Leica o Nikon FM), con lente grande en primer plano, efectos de lens flare, rollos de película desenrollados artísticamente, y fotografías reveladas flotando alrededor. Colores sepia, iluminación suave de estudio, y texturas de cuero y metal envejecido." },
    { category: "vintage", title: "🏍️ Vintage Motorcycle", desc: "Motocicleta clásica con detalles cromados y estilo rebelde.", prompt: "Motocicleta clásica americana (estilo Harley Davidson vintage), con tanque de combustible decorado con flames, asiento de cuero, cromados brillantes, y pose dinámica en carretera. Incluir elementos como casco vintage, chaqueta de cuero colgando, y fondo de route americana con señales retro." },
    { category: "vintage", title: "🚀 Space Age Retro", desc: "Diseño retro-futurista de los 60s con naves espaciales y astronautas.", prompt: "Estética retro-futurista de los años 60, con nave espacial de diseño optimista, astronauta en traje plateado clásico, planetas coloridos estilo ilustración vintage, y tipografía space age. Colores vibrantes pero vintage, formas aerodinámicas, y elementos que reflejen la visión futurista de esa época." },
    { category: "gotico", title: "💀 Skull Crown", desc: "Calavera real con corona ornamental y gemas brillantes.", prompt: "Calavera humana hiperrealista con una corona ornamental gótica, decorada con gemas rojas brillantes, detalles en oro envejecido, y patrones góticos grabados en el hueso. Fondo negro profundo, iluminación dramática que resalte las texturas del hueso y los reflejos de las gemas. Estilo dark fantasy con detalles muy precisos." },
    { category: "gotico", title: "🌹 Gothic Rose", desc: "Rosa negra con espinas ensangrentadas y pétalos marchitos.", prompt: "Rosa gótica de pétalos negros con bordes rojos, espinas afiladas con gotas de sangre, hojas marchitas, y tallos retorcidos. La rosa debe tener texturas realistas pero dramáticas, con efectos de luz que resalten su belleza oscura. Fondo con texturas de piedra antigua y efectos de niebla sutil." },
    { category: "gotico", title: "🦇 Gothic Bat", desc: "Murciélago con alas extendidas y detalles anatómicos precisos.", prompt: "Murciélago gótico con alas completamente extendidas, detalles anatómicos hiperrealistas, ojos rojos brillantes, colmillos visibles, y pose amenazante en vuelo. Las alas deben mostrar la textura de la membrana, venas visibles, y efectos de sombra dramática. Fondo de luna llena y nubes oscuras." },
    { category: "gotico", title: "🗡️ Gothic Sword", desc: "Espada medieval con empuñadura ornamental y hoja grabada.", prompt: "Espada gótica medieval con empuñadura ornamental tallada, gemas incrustadas en el pomo, hoja con grabados rúnicos, y efectos de luz que hagan brillar el metal. La espada debe estar clavada en una piedra antigua con musgo, rodeada de niebla y con iluminación dramática estilo medieval." },
    { category: "gotico", title: "🕷️ Gothic Spider", desc: "Araña negra con telaraña intrincada y gotas de rocío brillantes.", prompt: "Araña viuda negra en el centro de una telaraña gótica perfecta, con gotas de rocío que brillan como diamantes, hilos de seda que reflejan luz, y detalles anatómicos precisos de la araña. Fondo oscuro con efectos de luz filtrada, creando un ambiente misterioso pero hermoso." },
    { category: "gotico", title: "🌙 Gothic Moon", desc: "Luna llena con fases lunares y símbolos místicos alrededor.", prompt: "Luna llena gótica con cráter detallado, rodeada de las diferentes fases lunares en círculo, símbolos astrológicos y rúnicos flotantes, y efectos de luz plateada. El diseño debe tener elementos de astrología medieval, con estrellas, constelaciones, y un aura mística que sugiera magia lunar." },
    { category: "gotico", title: "🕯️ Candle Ritual", desc: "Velas góticas derritiéndose con llamas danzantes y cera escurriendo.", prompt: "Grupo de velas góticas de diferentes alturas, con llamas danzantes, cera derritiéndose artísticamente, candelabros de metal oxidado, y gotas de cera formando patrones. Iluminación dramática que resalte las llamas y las texturas de la cera, con sombras proyectadas que creen ambiente ritual." },
    { category: "gotico", title: "🏴‍☠️ Pirate Skull", desc: "Calavera pirata con bandana, parche y sables cruzados.", prompt: "Calavera pirata con bandana roja anudada, parche en una cuenca del ojo, diente de oro, y dos sables cruzados detrás. Incluir elementos pirata como monedas de oro esparcidas, brújula antigua, mapa del tesoro parcialmente visible, y efectos que sugieran aventuras en alta mar." },

    { category: "mascotas", title: "🐕 Golden Retriever", desc: "Golden retriever feliz con pelaje dorado y expresión amigable.", prompt: "Golden retriever con pelaje dorado brillante, lengua afuera en expresión feliz, ojos marrones expresivos, textura realista del pelo, collar colorido, y ambiente de parque o jardín. El perro debe transmitir lealtad y alegría, con detalles en las orejas caídas y nariz húmeda negra." },

    { category: "mascotas", title: "🦋 Colorful Parrot", desc: "Loro tropical con plumas vibrantes y pico curvo característico.", prompt: "Loro tropical con plumaje de colores vibrantes (rojo, azul, amarillo, verde), pico curvo negro brillante, ojos redondos expresivos, plumas detalladas con texturas realistas, posado en rama natural, y fondo de selva tropical que complemente sus colores naturales." },
    { category: "mascotas", title: "🐾 Paw Prints", desc: "Huellas de mascotas con corazones y elementos tiernos.", prompt: "Sendero de huellas de perro y gato alternadas, con pequeños corazones flotantes, colores pastel suaves, texturas que sugieran arena o tierra, algunas huellas más marcadas que otras, y elementos decorativos como huesos pequeños y pelotas que celebren el amor por las mascotas." },
    { category: "cyberpunk", title: "🤖 Cyborg Portrait", desc: "Retrato cyberpunk con implantes tecnológicos y ojos LED.", prompt: "Retrato de cyborg con mitad cara humana y mitad mecánica, implantes tecnológicos visibles, ojos con LED azul brillante, circuitos expuestos en la sien, cables neurales, texturas de metal y piel combinadas, iluminación neón azul/rosa, y ambiente futurista distópico urbano." },

    { category: "tipografia", title: "🔥 Burning Letters", desc: "Letras en llamas con efectos de combustión y calor.", prompt: "Tipografía ardiendo con llamas realistas, efectos de combustión en los bordes, partículas de fuego flotantes, gradientes de temperatura (rojo, naranja, amarillo, azul en la base), efectos de calor distorsionando el aire, y textura carbonizada en partes de las letras." },
    { category: "tipografia", title: "⚡ Electric Text", desc: "Texto con efectos eléctricos y rayos corriendo por las letras.", prompt: "Tipografía con electricidad corriendo por las letras, rayos y chispas saltando entre caracteres, efectos de tesla coil, iluminación azul eléctrica intensa, partículas cargadas flotando, y ambiente oscuro que haga contrastar la electricidad brillante de las letras electrificadas." }
];

let currentCategory = 'todos';
let searchTerm = '';

const searchInput = document.getElementById('search-input');
const filterButtons = document.querySelectorAll('.filter-btn');
const promptsGrid = document.getElementById('prompts-grid');
const countSpan = document.getElementById('count');

function filterPrompts() {
    return PROMPTS.filter(p => {
        const matchCat = currentCategory === 'todos' || p.category === currentCategory;
        const matchSearch = !searchTerm ||
            p.title.toLowerCase().includes(searchTerm) ||
            p.desc.toLowerCase().includes(searchTerm) ||
            p.prompt.toLowerCase().includes(searchTerm);
        return matchCat && matchSearch;
    });
}

const categoryLabels = {
    streetwear:'STREETWEAR', anime:'ANIME', vintage:'VINTAGE', gotico:'GÓTICO',
    motivacional:'MOTIVACIONAL', grunge:'GRUNGE', minimalista:'MINIMAL',
    naturaleza:'NATURALEZA', musica:'MÚSICA', abstracto:'ABSTRACTO',
    deportivo:'DEPORTIVO', mascotas:'MASCOTAS', cyberpunk:'CYBERPUNK', tipografia:'TIPOGRAFÍA'
};

function renderPrompts() {
    const filtered = filterPrompts();
    countSpan.textContent = filtered.length;
    if (!filtered.length) {
        promptsGrid.innerHTML = '<div class="no-results"><h3>🔍 No se encontraron prompts</h3><p>Prueba con otros términos o cambia la categoría.</p></div>';
        return;
    }
    promptsGrid.innerHTML = filtered.map(p => `
        <div class="card">
            <div class="category-badge">${categoryLabels[p.category] || p.category}</div>
            <div class="card-title">${p.title}</div>
            <div class="card-desc">${p.desc}</div>
            <pre>${p.prompt}</pre>
            <button class="copy-btn" data-prompt="${encodeURIComponent(p.prompt)}">Copiar prompt</button>
        </div>
    `).join('');
}

document.addEventListener('click', function(e) {
    const btn = e.target.closest('.copy-btn');
    if (!btn) return;
    const text = decodeURIComponent(btn.dataset.prompt);
    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✅ Copiado';
        btn.style.background = '#16a34a';
        btn.style.borderColor = '#16a34a';
        setTimeout(() => {
            btn.textContent = 'Copiar prompt';
            btn.style.background = '#dc2626';
            btn.style.borderColor = '#dc2626';
        }, 1500);
    });
});

searchInput.addEventListener('input', e => {
    searchTerm = e.target.value.toLowerCase();
    renderPrompts();
});

filterButtons.forEach(btn => {
    btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.category;
        renderPrompts();
    });
});

renderPrompts();
</script>
